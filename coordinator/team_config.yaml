# MACRS 多模型团队配置
# 参考 open-code-review 的配置设计

models:
  # 模型别名
  aliases:
    workhorse: claude-sonnet-4-6
    big-brain: claude-opus-4-7
    fast: claude-haiku-4-5

  # 默认模型
  default: workhorse

# 团队组成
default_team:
  # Form 1 - 简写：N 个实例，使用默认模型
  quality: 2

  # Form 2 - 对象：N 个实例，共享一个模型
  security: { count: 1, model: big-brain }

  # Form 3 - 列表：每个实例独立配置模型和名称
  principal:
    - { model: big-brain }
    - { model: workhorse, name: principal-balanced }
